<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Mamadas - Baby Feed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .history-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .history-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 500;
        }

        .history-table th:first-child {
            border-radius: 10px 0 0 0;
        }

        .history-table th:last-child {
            border-radius: 0 10px 0 0;
        }

        .history-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-table tr:hover {
            background: #f5f5f5;
        }

        .type-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .type-materno {
            background: #e3f2fd;
            color: #1976d2;
        }

        .type-formula {
            background: #fff3e0;
            color: #f57c00;
        }

        .btn-delete {
            background: #ef5350;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-delete:hover {
            background: #c62828;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .history-table {
                font-size: 0.9rem;
            }

            .history-table th,
            .history-table td {
                padding: 10px;
            }
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-clear:hover {
            background: #ee5a52;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍼 Tracker de Mamadas</h1>
            <p>Acompanhe a alimentação do seu bebê</p>
        </header>

        <div class="success-message" id="successMessage">
            ✓ Mamada registrada com sucesso!
        </div>

        <div class="main-content">
            <!-- Formulário -->
            <div class="card">
                <h2>📝 Nova Mamada</h2>
                <form id="feedForm">
                    <div class="form-group">
                        <label for="feedType">Tipo de Alimentação</label>
                        <select id="feedType" required>
                            <option value="">Selecione...</option>
                            <option value="materno">Leite Materno 🤱</option>
                            <option value="formula">Fórmula 🍼</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="feedDuration">Duração (minutos)</label>
                        <input type="number" id="feedDuration" min="1" max="180" required placeholder="Ex: 20">
                    </div>

                    <div class="form-group">
                        <label for="feedDate">Data e Hora</label>
                        <input type="datetime-local" id="feedDate" required>
                    </div>

                    <button type="submit" class="btn-submit">✓ Registrar Mamada</button>
                </form>
            </div>

            <!-- Dashboard -->
            <div class="card">
                <h2>📊 Dashboard de Hoje</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="number" id="todayCount">0</div>
                        <div class="label">Mamadas Hoje</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="todayDuration">0</div>
                        <div class="label">Minutos Totais</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="avgDuration">0</div>
                        <div class="label">Média (min)</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="feedChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Histórico -->
        <div class="history-section">
            <h2>📜 Histórico Recente</h2>
            <button class="btn-clear" onclick="clearAllData()">🗑️ Limpar Todos os Dados</button>
            <div id="historyContent">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    <p>Nenhuma mamada registrada ainda</p>
                    <p>Comece adicionando uma mamada no formulário acima!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicialização
        let feeds = JSON.parse(localStorage.getItem('babyFeeds')) || [];
        let chart;

        // Configurar data/hora atual no formulário
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('feedDate').value = now.toISOString().slice(0, 16);

            initChart();
            updateDashboard();
            updateHistory();
        });

        // Inicializar gráfico
        function initChart() {
            const ctx = document.getElementById('feedChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Leite Materno', 'Fórmula'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#1976d2', '#f57c00'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    family: 'Poppins',
                                    size: 14
                                }
                            }
                        },
                        title: {
                            display: true,
                            text: 'Distribuição por Tipo',
                            font: {
                                family: 'Poppins',
                                size: 16,
                                weight: '600'
                            },
                            padding: {
                                bottom: 20
                            }
                        }
                    }
                }
            });
        }

        // Formulário submit
        document.getElementById('feedForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const feed = {
                id: Date.now(),
                type: document.getElementById('feedType').value,
                duration: parseInt(document.getElementById('feedDuration').value),
                date: document.getElementById('feedDate').value
            };

            feeds.push(feed);
            feeds.sort((a, b) => new Date(b.date) - new Date(a.date));
            saveFeeds();

            // Mostrar mensagem de sucesso
            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);

            // Limpar formulário
            this.reset();
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('feedDate').value = now.toISOString().slice(0, 16);

            updateDashboard();
            updateHistory();
        });

        // Salvar no localStorage
        function saveFeeds() {
            localStorage.setItem('babyFeeds', JSON.stringify(feeds));
        }

        // Atualizar dashboard
        function updateDashboard() {
            const today = new Date().toDateString();
            const todayFeeds = feeds.filter(feed =>
                new Date(feed.date).toDateString() === today
            );

            const todayCount = todayFeeds.length;
            const todayDuration = todayFeeds.reduce((sum, feed) => sum + feed.duration, 0);
            const avgDuration = todayCount > 0 ? Math.round(todayDuration / todayCount) : 0;

            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('todayDuration').textContent = todayDuration;
            document.getElementById('avgDuration').textContent = avgDuration;

            // Atualizar gráfico
            const maternoCount = todayFeeds.filter(f => f.type === 'materno').length;
            const formulaCount = todayFeeds.filter(f => f.type === 'formula').length;

            chart.data.datasets[0].data = [maternoCount, formulaCount];
            chart.update();
        }

        // Atualizar histórico
        function updateHistory() {
            const container = document.getElementById('historyContent');

            if (feeds.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <p>Nenhuma mamada registrada ainda</p>
                        <p>Comece adicionando uma mamada no formulário acima!</p>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Tipo</th>
                            <th>Duração</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${feeds.map(feed => `
                            <tr>
                                <td>${formatDate(feed.date)}</td>
                                <td><span class="type-badge ${feed.type === 'materno' ? 'type-materno' : 'type-formula'}">
                                    ${feed.type === 'materno' ? '🤱 Leite Materno' : '🍼 Fórmula'}
                                </span></td>
                                <td>${feed.duration} minutos</td>
                                <td><button class="btn-delete" onclick="deleteFeed(${feed.id})">Excluir</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHTML;
        }

        // Formatar data
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Deletar mamada
        function deleteFeed(id) {
            if (confirm('Tem certeza que deseja excluir este registro?')) {
                feeds = feeds.filter(feed => feed.id !== id);
                saveFeeds();
                updateDashboard();
                updateHistory();
            }
        }

        // Limpar todos os dados
        function clearAllData() {
            if (confirm('Tem certeza que deseja limpar TODOS os dados? Esta ação não pode ser desfeita.')) {
                feeds = [];
                saveFeeds();
                updateDashboard();
                updateHistory();
            }
        }
    </script>
</body>
</html>
